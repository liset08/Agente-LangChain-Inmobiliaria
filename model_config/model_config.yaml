# ============================================
# Configuración del modelo (LLM)
# ============================================
# Parámetros del chat model usado por el agente.

model:
  name: gpt-4.1 #gpt-o4-mini
  temperature: 0.7

# Zona horaria por defecto del agente (usada para el contexto de fecha/hora).
# Puede sobreescribirse con la variable de entorno AGENT_TIMEZONE.
agent_timezone: America/Lima
